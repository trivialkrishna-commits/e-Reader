PROLOGUE

“I’m just a girl, standing in front of a
boy, asking him to love her.”

—Notting Hill

My mother taught me the golden rule of dating before I even hit the second
grade.

At the ripe age of seven, I’d snuck into her room after having a nightmare. (A
house-size cricket might not sound scary, but when it speaks in a robot voice and
knows your middle name, it is terrifying.) Bridget Jones’s Diary was playing on
the boxy television on top of the dresser, and I’d watched a good portion of the
movie before she even noticed me at the foot of her bed. At that point, it was too
late to rescue me from the so-not- first-grade-friendly content, so she snuggled up
beside me, and we watched the happy ending together.

But my  first-grade brain just couldn’t compute. Why would Bridget give up
the cuter one—the charming one—for the person who was the equivalent of
one ginormous yawn? How did that even make sense?

Yep—I’d missed the movie’s point completely and had fallen madly in love
with the playboy. And to this day, I can still hear my mom’s voice and smell the
vanilla of her perfume as she played with my hair and set me straight.

“Charm and intrigue can only get you so far, Libby Loo. Those things always
disappear, which is why you never, ever choose the bad boy.”

After that, we shared hundreds of similar moments, exploring life together
through romantic movies. It was our thing. We’d snack-up, kick back on the
pillows, and binge-watch from her collection of kiss-infused happy endings like
other people binge-watched trashy reality TV.

Which, in hindsight, is probably why I’ve been waiting for the perfect
romance since I was old enough to spell the word “love.”



And when she died, my mother bequeathed to me her unwavering belief in
happily ever after. My inheritance was the knowledge that love is always in the
air, always a possibility, and always worth it.

Mr. Right—the nice-guy, dependable version—could be waiting around the
very next corner.

Which was why I was always at the ready.
It was only a matter of time before it  finally happened for me.

“Nobody finds their soul mate when
they’re ten. I mean, where’s the fun in

—Sweet Home Alabama

The day began like any typical day.
Mr. Fitzpervert left a hair ball in my slipper, I burned my earlobe with the

straightener, and when I opened the door to leave for school, I caught my next-
door nemesis suspiciously sprawled across the hood of my car.

“Hey!” I slid my sunglasses up my nose, pulled the front door shut behind
me, and hightailed it in his direction, careful not to scuff  my pretty new  floral
 ats as I basically ran at him. “Get off of my car.”

Wes jumped down and held up his hands in the universal I’m innocent pose,
even though his smirk made him look anything but. Besides, I’d known him
since kindergarten; the boy had never been innocent a day in his life.

“What’s in your hand?”
“Nothing.” He put the hand in question behind his back. Even though he’d

gotten tall and mannish and a tiny bit hot since grade school, Wes was still the
same immature boy who’d “accidentally” burned down my mom’s rosebush
with a  firecracker.

“You’re so paranoid,” he said.
I stopped in front of him and squinted up at his face. Wes had one of those

naughty-boy faces, the kind of face where his dark eyes—surrounded by mile-
long thick lashes because life wasn’t fair—spoke volumes, even when his mouth
said nothing.

An eyebrow raise told me just how ridiculous he thought I was. From our
many less-than-pleasant encounters, I knew the narrowing of his eyes meant he
was sizing me up, and that we were about to throw down about the most recent



annoyance he’d brought upon me. And when he was bright-eyed like he was
right now, his brown eyes practically freaking twinkling with mischief, I knew I
was screwed. Because mischievous Wes always won.

I poked him in the chest. “What did you do to my car?”
“I didn’t do anything to your car, per se.”
“Per se?”
“Whoa. Watch your  filthy mouth, Buxbaum.”
I rolled my eyes, which made his mouth slide into a wicked grin before he

said, “This has been fun, and I love your granny shoes, by the way, but I’ve gotta
run.”

“Wes—”
He turned and walked away from me like I hadn’t been speaking. Just…

walked toward his house in that relaxed, overconfident way of his. When he got
to the porch, he opened the screen door and yelled to me over his shoulder,
“Have a good day, Liz!”

Well, that couldn’t be good.
Because there was no way he legitimately wanted me to have a good day. I

glanced down at my car, apprehensive about even opening the door.
See, Wes Bennett and I were enemies in a no-holds-barred, full-on war over

the one available parking spot on our end of the street. He usually won, but only
because he was a dirty cheater. He thought it was funny to reserve the Spot for
himself by leaving things in the space that I wasn’t strong enough to move. Iron

(Even though his antics caught the attention of the neighborhood Facebook
page—my dad was a group member—and the old gossips frothed with rage at
their keyboards over the blights on the neighborhood landscape, not a single
person had ever said anything to him or made him stop. How was that even
fair?)

But I was the one riding the victory wave for once, because yesterday I’d had
the brilliant idea to call the city after he’d decided to leave his car in the Spot for
three days in a row. Omaha had a twenty-four-hour ordinance, so good old
Wesley had earned himself a nice little parking ticket.



Not going to lie, I did a little happy dance in my kitchen when I saw the
deputy slide that ticket underneath Wes’s windshield wiper.

I checked all four tires before climbing into my car and buckling my seat belt.
I heard Wes laugh, and when I leaned down to glare at him out the passenger
window, his front door slammed shut.

Then I saw what he’d found so funny.
The parking ticket was now on my car, stuck to the middle of the windshield

with clear packing tape that was impossible to see through. Layers and layers of
what appeared to be commercial grade packing tape.

I got out of the car and tried to pry up a corner with my  fingernail, but the
edges had all been solidly  flattened down.

What a tool.

When I  finally made it to school after scraping my windshield with a razor blade

Yeah—I have a nerd-level fascination with movie soundtracks.

“Thanks!” I went over to the mirror and did a turn to make sure the vintage

Many. Times.

I disliked her so very much.
On the  first day of kindergarten, she’d yelled Ewwww when I’d gotten a

In third grade, she’d told Dave Addleman that my notebook was full of love

after my mom had died and I’d been forced to sit by Laney in the lunchroom

would unzip her pastel pink lunchbox and wow the entire table with the delights
her mother had made just for her.

Sandwiches cut into adorable shapes, homemade cookies, brownies with
sprinkles; it had been a treasure trove of kiddie culinary masterpieces, each one
more lovingly prepared than the last.

But the notes were what had destroyed me.
There wasn’t a single day that her lunch didn’t include a handwritten note

from her mom. They were funny little letters that Laney used to read out loud

To this day, everyone thought Laney was great and pretty and smart, but I
knew the truth. She might pretend to be nice, but for as long as I could
remember, she’d given me crusty-weird looks. As in every single time the girl

“Gum?” Laney held out a pack of Doublemint with her perfectly arched
eyebrows raised.

“No, thanks,” I muttered, and turned my attention to the front of the room
as Mrs. Adams came in and asked for homework. We passed our papers forward,
and she started talking about literary things. Everyone began taking notes on
their school-issued laptops, and Colton Sparks gave me a chin nod from his desk

I smiled and looked down at my computer. Colton was nice. I’d talked to him
for a solid two weeks at the beginning of the year, but that had turned out to be
meh. Which kind of summed up the whole of my collective dating history,
actually: meh.

Two weeks—that was the average length of my relationships, if you could
even call them that.

Here’s how it usually went: I would see a cute guy, daydream about him for
weeks and totally build him up in my mind to be my one-and-only soul mate.
The usual high school pre-relationship stuff  always began with the greatest of

Definition of the Ick: A dating term that refers to a sudden cringe feeling one

immediately put off by them.

Joss said I was always browsing but never buying. And she ended up being

my heart  utter, but who was even left in the school that I hadn’t already
considered?

I mean, technically, I had a prom date; I was going with Joss. It’s just… going
to prom with my best friend felt like such a fail. I knew we’d have a good time—
we were grabbing dinner beforehand with Kate and Cassidy, the funnest of our
little friend group—but prom was supposed to be the pinnacle of high school
romance. It was supposed to be poster-board promposals, matching corsages,
speechless awe over the way you look in your dress, and sweet kisses under the
cheesy disco ball.

Andrew McCarthy and Molly Ringwald Pretty in Pink sort of shit.
It wasn’t about friends grabbing dinner at the Cheesecake Factory before

heading up to the high school for awkward conversation while the coupled-o 
couples found their way to the infamous grinding wall.

I knew Jocelyn wouldn’t get it. She thought prom was no big deal, just a high
school dance that you dressed up for, and she would  nd me completely
ridiculous if I admitted to being disappointed. She was already peeved by the
fact that I kept blowing her o  on dress shopping, but I never felt like going.

At all.
My phone buzzed.
Joss: I have BIG tea.
I looked over at her, but she appeared to be listening to Mrs. Adams. I

glanced at the teacher before responding: Spill it.
Joss: FYI I got it via text from Kate.
Me: So it might not be true. Got it.



The bell rang, so I grabbed my stuff  and shoved it into my bag. Jocelyn and I
started walking toward our lockers, and she said, “Before I tell you, you have to
promise you’re not going to get all worked up before you hear everything.”

“Oh my God.” My stomach stress-dropped, and I asked, “What’s going on?”
We turned down the west wing, and before I had a chance to even look at her,

I saw him walking toward me.
Michael Young?
I came to a complete halt.
“Aaaand—there’s my tea,” Joss said, but I wasn’t listening.
People bumped o  me and went around me as I stood there and stared. He

I think my heart might have stopped.
Michael had lived down the street when we were little, and he’d been

My brain cued up “Someone Like You,” and the song started over from the

I’ve been searching a long time,
For someone exactly like you.

He was wearing khakis and a nice black shirt, the kind of out t that showed

His hair, not his clothes.

Oh. My. God.
I was dressed for it; he was beautiful. Could this moment be more perfect? I

made eye contact with Joss, who was slowly shaking her head, but it didn’t
matter.

Michael was back.
He smelled good—so, so good—and I wanted to catalogue every tiny detail

Was it wrong to close my eyes and take a deep brea—
“Oof.” Someone bumped into us, hard, destroying the hug. I was shoved into

His eyebrows crinkled together. “Yeah…?”

Only now he had a slightly Southern drawl.

Jocelyn, who I might have forgotten existed in the presence of such lovely

I rolled my eyes and ignored her.

That wouldn’t be good for me. Couldn’t be.



Because Wes Bennett got o  on messing with me—he always had. In grade

“Sounds good,” Michael said with a nod, and I wondered what he’d look like

I’d have to Google it later.

“I’ll ask Wesley.”
“Cool.” I worked to give him my top-shelf smile, even though I was dying

Then take me with you to the party! I yelled internally.
“Joss?” Michael looked past me, and his mouth dropped open. “Is that you?”
She rolled her eyes. “Took you long enough.”
Jocelyn had always been closer to the neighborhood boys, playing football

with Wes and Michael while I did awful cartwheels around the park and made
up songs. Since then, she’d turned into this tall and freakishly good-looking



human. Today her braids were all pulled back into a ponytail, but instead of
looking messy like when I wore a ponytail, it showed o  her cheekbones.

The warning bell rang, and he pointed up at the speaker. “That’s me. See y’all
later.”

Y’all.
He went the other way, and Jocelyn and I started walking. I said, “I can’t

believe Wes didn’t invite us to the party.”
She gave me side-eye. “Do you even know who Ryno is?”
“No, but that’s beside the point. He invited Michael right in front of us. It’s

common courtesy that he should invite us, too.”
“But you hate Wes.”
“So?”
“So why would you want him to invite you anywhere?”
I sighed. “His rudeness just pisses me o .”
“Well I, for one, am glad he didn’t, because I don’t want to go to any party

that those guys are having. I’ve been to Ryno’s, and it’s all about beer bongs,
Fireball, and that never-have-I-ever kind of immature stuff.”

Joss used to hang out with the popular kids before she quit volleyball, so
she’d “partied” a little before we became friends. “But—”

“Listen.” Jocelyn stopped walking and grabbed my arm to stop me from
walking too. “That’s what I was going to tell you. Kate said he lives next door to
Laney and they’ve been talking for a couple weeks now.”

“Laney? Laney Morgan?” Nooo. It couldn’t be true. No-no-no-no, please,
God, no. “But he just got here—”

“Apparently he moved back a month ago but was finishing classes online at
his other school. Rumor has it that he and Laney are almost official.”

Not Laney. My stomach clenched as I pictured her perfect little nose. I knew
it was irrational, but the idea of Laney and Michael was almost too much for me
to bear. That girl always got everything I wanted. She couldn’t have him,
dammit.

The thought of them, together, made my throat tight. It made my heart hurt.
It would crush me.



Because not only was he everything I daydreamed about, but he and I had
history. The wonderful, important kind of history that involved drinking from
garden hoses and catching lightning bugs. I thought back to the last time I’d seen
Michael. It’d been at his house. His family had had a cookout to say goodbye to
all the neighbors, and I’d walked over with my parents. My mom had made her
famous cheesecake bars, and Michael had met us at the door and offered us
drinks like he was a grown-up.

My mom had called it the most adorable thing she’d ever seen.
All the neighborhood kids played kickball in the street for hours that night,

and the adults even joined us for a game. At one point, my mother was high-
 ving Michael after stealing home base in her  oral sundress and wedge sandals.
That moment was pressed in my memories like a yellowed photograph in an

I don’t think Michael ever had a clue as to how madly in love with him I’d
been. They moved a month before my mom died, breaking the tip of my soon-
to-be shattered heart.

Jocelyn looked at me like she knew exactly what I was thinking. “Michael
Young is not your racing-to-the-train-station dude. Got it?”

But he could be. “Well, technically they aren’t official yet, so…”
We started walking again, dodging bodies as we headed for her locker. We

Michael, but it would totally be worth it.

“Seriously. Don’t be that girl.” She gave me her motherly scowl. “That there

“But.” I didn’t even want to say it because I didn’t want her to shoot it down.

“I know,” I breathed, smiling like I knew what she was talking about while
taking in the stoic, serious expression on Wes’s face. “Total heart attack moment.
Like, whaaat? Ash was crowned?”

“What are you doing out here?” Wes asked, looking at me with an unreadable
expression that made the tips of my ears burn hot. He was probably pissed that I
was in the way of a potential seduction.

Had he brought her there for that? Were they waiting for me to leave so they
could get to it? For some reason, the thought of them together was a hundred
times worse when it involved the Secret Area.

“I, um, I followed my cat out here earlier and…” I pointed toward my house
as words failed to make sense to me. “I dropped something and thought it
might’ve rolled under this bush.”

And I pointed to Wes’s forest like a distraught toddler.
“Your cat doesn’t go outside.”
I made a face and said, “Yes, he does. Actually, no, you’re right. He ran out.”
“Really? And what did you drop?” He didn’t look amused at all.
“Um, it was money. A penny.” I cleared my throat and said, “I dropped a

penny and it rolled away. So yeah. I was just out here, looking for my penny. It
was lucky.”

“Your—”
“Penny. Yep. But it doesn’t matter. I don’t need it.” I cleared my throat again,

but the tightness just wouldn’t go away. “The penny, y’know? I mean, who
needs a penny, am I right? My stepmom throws them away, for God’s sake.”



They both just stared at me, and the hard lines of Wes’s face made me
homesick for our before, for his laughing eyes before I’d ruined everything. “It’s
weird how sometimes there can be a penny that’s, like, always there, and you

Alex tilted her head and scrunched her eyebrows together, but not a single
thing on Wes’s face changed as I rambled.

“Then you wake up one day and your eyes are opened to just how amazing
pennies are. How had you not noticed before, right? I mean, they’re like the best
coins ever. As in, better than all the other coins combined. But you weren’t
careful and you lost your penny and you just wish you could make your penny
understand how much you regret not cherishing it, but it’s too late because you
lost it. Y’know?”

“Liz, do you need to borrow some money?” Alex looked at me, and I was a
little bit close to crying again.

I shook my head and said, “Um, no, thanks, I’ve got to run—even though
I’m penniless, ha ha ha—so you guys have fun.” I took a step backward and did a
tiny wave thing. “Don’t do anything I wouldn’t do.”

Stop talking, you dipshit!
I sensed—without looking—that they were still staring at me as I climbed

over Wes’s fence and ran through my backyard.

“Thank you.” I took the bag from the McDonald’s employee, tossed it onto the
passenger seat, and drove away. It was midnight, and I’d spent the past hour just
driving around, cranking Adele and sob-singing, and trying to stay gone long
enough for Alex to have left and for Wes to have gone inside. I would rather have
done almost anything in the world than see either one of them, so I’d texted
Helena and just cruised the city.

And my dad was the coolest person on the planet for not texting me a single
word of warning when he knew I was driving around aimlessly after midnight. It
had to be killing him.

I’d considered getting ice cream on my way home, but I hadn’t been up to
actually getting out of my car, so I’d settled on the golden arches. I just wanted to
go home and sad-eat, watch a movie, and try to forget how badly I’d humiliated
myself.

A penny. Seriously? They’d probably laughed about me until they fell into
each other’s arms and had perfect sex.

“Dammit.” I grabbed a  stful of fries and jammed them into my mouth
before pulling into The Spot. It wasn’t mine anymore—it was Wes’s forever—
but at the moment I didn’t care. His car was in his driveway, so screw him.

Instead of getting out after parallel parking, though, I just sat there, wol ng
down my food and listening to the radio. Getting out of the car and walking
across the street seemed like work at that tired moment, and I was also terri ed
of running into the happy couple. It would be just my luck to walk by at the



exact moment they decided to get hot and heavy in his driveway, or something
equally nightmarish.

I  nished my food and was drinking my chocolate shake with the seat half-
reclined when there was a knock on my window.

“Shit!” I jumped, and my straw splattered milkshake onto Wes’s hoodie. I
looked through the fogged-up window and could see a tall body in a letter jacket.

Someone please kill me.
I wiped my mouth with my  fingers, put my seat back up, and rolled down the

window. Gave him a cool smile. “Yes?”
Wes glared down at me. “What are you doing?”
“Um… parking.”
“I watched you park ten minutes ago. Try again.”
“Wow. Creep much?”
“I wanted to talk to you, so yeah, I was waiting. But now I think maybe

you’re never going to get out of that car.”
I rolled my eyes and set down my shake. Apparently I was going to have to

face him and my utter humiliation twice in one night. How awesome. I got out
of the car and shut the door. Crossed my arms and looked up at his face. “What
do you need?”

“Well, for starters, I need you to explain what happened earlier.”
My heart hurt as I looked at him. His hair was tousled, like he’d dragged his

hand through it a hundred times, and he was wearing his untucked dress shirt
and tuxedo pants under his jacket. He was an absolute mess, and my  fingers
itched to touch him.

I narrowed my eyes and acted confused. “Are you talking about when I lost
my—”

“Nope.” He gave me a look of warning and said, “Do not say ‘penny.’ ”
“Sorry.” I looked down at my shoes and muttered, “Lucky coin.”
“Really? You’re sticking to that?”
I just shrugged and stared at my Chucks, clueless about what to say.

Everything I’d planned to tell him during my whole be brave phase felt too hard
to say after seeing him with Alex. Especially when he’d looked so unhappy to see
me in the Secret Area.



I still couldn’t believe he’d taken her back there.
His nostrils  ared and he said, “Oh, well, that explains everything.”
“Why do you seem mad at me?” I raised my eyes to his face and waited for an

answer. I was the one who wished to spontaneously combust. Why was he being
salty?

His jaw  exed before he said, “Because I hate games.”
“What games?”
“What games?” His eyes were hot, and yeah—he was mad. “You won your

precious Michael, but as soon as I looked twice at Alex, you’re burning me this
unbelievable CD and rambling about lucky pennies in a way that makes me
think I’m the penny in that particular scenario. While wearing my baseball
hoodie. What are you doing to me?”

“You saw the CD?” I bit the inside of my cheek and wondered how much
humiliation a person could take before it literally killed them. Because as I
pictured the ketchup initials I’d put on the CD cover, I felt like I was close to
combusting and gently  oating to the ground as ash.

He stuck his hands into his coat pockets. “I’m not oblivious, Liz. I also saw
the note, the soggy s’mores supplies, and the busted CD player.”

“Oh.” I took a shuddering breath as his dark eyes bore into me. Then I
blurted, “So do you like her?”

His eyebrows furrowed together like he hadn’t expected the question, which
was fair, because I hadn’t expected to ask it.

But I needed to know.
He swallowed and I thought he wasn’t going to answer, but then he said,

“Alex is great.”
“Oh.” I hoped my face didn’t show how close I was to crying, how that one

syllable was like a punch to the stomach. “Well, yay. I’ve got to go.”
I took a step around him, but he grabbed my arm and stopped me. “That’s it?

You’re not going to explain what all of that was?”
“It doesn’t matter now.”
“It might.”
“It doesn’t, okay?” I tried to sound light and easy, like I was  ne with

everything as he dropped his hand. “I made the CD and set an embarrassing



scene because I realized that Michael isn’t the person I can’t stop thinking about,
and I wanted to tell you. I mean, he’s great, but being with him is nothing like
eating burgers with you, or sneaking out to the Secret Area to make s’mores and
look at the stars, or  ghting with you over a parking space. But it took me too
long to  gure that out, and now you’ve got Alex.”

He opened his mouth, but I shook my head.
“No. It’s  ne—I get it. She’s  awless and sweet, and as much as I hate to say

it, you deserve someone like her.” I took a big, shaky breath as those dark eyes
made me so sorry for everything I’d done to get us here. “Because I was wrong,
Wes. You are the good stuff.”

He scratched his chin and looked past me, down the street. Then he settled
his eyes on my face and said, “That’s not the only thing you’re wrong about.”

“What?” Leave it to him to kick me when I’m down. “What’re you talking
about?”

“You’re wrong about Alex. She’s not  awless.”
“Bennett, no one is totally  awless—come on.” I couldn’t believe his nerve.

“She’s pretty dang close, though.”
“I suppose.”
“You suppose? What on earth could she possibly be lacking? Do you want

bigger boobs or something? Is she not—”
“She’s not you.”
“What?”
“She. Isn’t. You.”
I shut my mouth and looked at him, scared to believe he was saying what it

sounded like he was saying.
“She’s pretty, but her face doesn’t transform into sunlight when she talks

about music.” He did that clench thing with his jaw and said, “She’s funny, but
not spit-out-your-drink-in-astonishment funny.”

It felt like my heart was going to explode as his eyes moved down to my lips
under the glow of the buzzing streetlight. He moved his face a little closer to
mine, looked into my eyes, and rumbled, “And when I see her, I don’t feel like I
have to talk to her or mess up her hair or do something—anything—to get her
to swing that gaze on me.”



My hands were shaking when I tucked my hair behind my ears and breathed,
“You haven’t messed up my hair in a really long time.”

“And it’s been killing me.” He took a step closer, which pressed me against
the side of my car. “I fell in love with teasing you in the second grade, when I first
discovered that I could turn your cheeks pink with just a word. Then I fell in
love with you.”

I’m pretty sure my heart was developing an arrhythmia with each word he
said. “So you and Alex aren’t—”

“Nope.” He reached down and wrapped the drawstrings on my hoodie—his
hoodie—around his hands. “We’re just friends.”

“Oh.” My brain was trying to keep up, but his handsome face was making it
di cult. That and his sudden presence in my personal space, not to mention the
gentle pull of him tugging me closer. I was muddled. “Well, why did you act like
you wanted me to say yes to Michael’s promposal?”

“You’ve loved him since kindergarten.” His eyes were all I could see as he
quietly said, “I didn’t want our kiss to get in the way of that if it was what you
really wanted.”

How had I ever thought Wes was anything other than amazing? I didn’t even
try to stop the lovesick smile from taking over my face as I set my hands on his
chest and said, “What I really wanted was to go with you.”

“Well, you could’ve told me that, Buxbaum.” His voice was just a breath
between us as he said, “Because just seeing you in that dress made me want to

“It did?”
He yanked on the drawstring. “That’s not supposed to make you happy.”
“I know.” I was giving away my every emotion as I beamed up at him, but I

couldn’t help it. I couldn’t hold back and be cool even if I tried. Because the
thought of Wes being pissed at Michael—and jealous—over me, was just too
wonderful. “But it does. It’s just so swoony.”

“Forget swoony.” He let go of the strings and slid his hands up the sides of my
face until he was holding it in his big palms. I sucked in a breath as his mouth
lowered, and my brain cued up the perfect song for this ending. Or rather, this
beginning.



I’ve been searching a long time,
For someone exactly like you

Our kiss was breathless and wild and Wes pulled away too soon. He wrapped
his arms around me, picked me up, and moved me to the trunk of my car.

He smiled after plopping me down and said, “Do you realize we could’ve

“Nah—I didn’t like you until recently.”
“Enemies-to-lovers—it’s our trope, Buxbaum.”
“You poor, confused little love lover.” A giggle shimmied through me before I

set my hands on his face and said as I pulled him back to me, “Just shut up and

“A girl will never forget the first boy she
likes.”

—He’s Just Not That into You

“But she’ll also never forget the first boy
she hates.”

—Liz Buxbaum

I dropped the bright yellow mum into the hole and covered the roots with dirt.
The early-September sun was hot on my face as I planted the flowers, but it had
the blurry feel of a day in transition, like its heat was all for show and entirely
lacking in the power it’d once held.

“Since you have daisies in the summer, we thought it might be nice for you to
have mums in the fall.” I looked at my mom’s headstone and wondered how I
was going to cope with the distance. I was down to one hour until I left for
California, and even though logically I knew it was silly, a tiny part of me
worried I was going to feel lost without our daily chats.

“It was all Helena’s idea.” Wes took a sip of water before picking up the bag
of potting soil and saying to my mother’s headstone, “Don’t let your kid take all
the credit.”

It had been Helena’s idea. She and I had had a lot of good talks after prom,
and she had been super understanding about my grief. Instead of trying to
convince me that I should move on or get closure, she’d bought a little bench for
the gravesite—with a lovely  oral cushion—so I wouldn’t have to sit on the
ground.

She’d also bought me a jacket made of alpaca hair because she’d read that
ghosts inherently know that the wearer of that material is not a threat. She made



me wear it every time I went to the cemetery after dark, because she didn’t want
me getting possessed by the devil or one of his lackeys.

I was really starting to love my goofy stepmom.
“He’s right.” I said, sticking out my tongue at Wes. “But I love the idea. This

way, even though I’m not here, my flowers will bloom beside you.”
“Unless they die because Liz is a horrible gardener.”
I grinned and launched the trowel in his direction. “That could actually

happen. Your green thumb—and frankly, your desire to even have one—is
clearly skipping a generation.”

Wes caught the gardening tool as if he’d expected the throw and took the
supplies to his car. I dusted my hands on my jeans and sat back on my heels. It
was a little hard to believe that Wes and I were both going away to California
after we were done, but it felt right. He’s always been there—the annoying boy
next door—and now he was going to be the annoying boy in the dorm next
door.

As it turned out, Wes was a rock star pitcher and got o ers from schools all
over the country. In the end he’d selected UCLA, but he made sure I knew it had
nothing to do with me. I believe his exact words had been So we’re totally free to
dump each other in Cali without any weird guilt. This is just a freak accident that
we’re going to the same school, not any love bullshit.

And then he’d given me a boyish grin and a kiss that made me forget my
name.

For a few months now, Wes had been going with me to my mom’s grave a
couple times a week. He usually wandered away so I could talk to her—rain or
shine—but then he always came back in time to say goodbye to my mom and tell
her something sarcastic about me.

It was cheesy, and I adored him for it.
“Well,” I said, “we should probably get going because we’re supposed meet

Dad, Helena, and Joss in ten minutes.”
We were meeting at a café for breakfast, and then my dad and Helena were

driving the U-Haul to California while Wes and I followed in his car.
I stood and looked over at him as he closed the trunk. He was wearing the T-

shirt I’d bought him as a graduation present; it said EDUCATED FEMINIST BRO. I’d



bought it to be funny, but he wore it all the time.
It went well with his smart-ass smile.
I watched him walk around the car and open the back door, where Mr.

Fitzpervert was sitting in his carrier in my favorite little plaid scarf, ears up and
listening to every outdoor noise the cemetery had to o er. Wes called him Mr.
Fuzzy with the Silly Clothes and acted like he didn’t like cats, but he also always
scratched him in that exact place Fitz liked behind his ear. And as I stood there,
watching him talk to my cat, I realized the truth.

Wes was the good guy in the movie. Yes, he was funny and the life of the
party, but he was also dependable and understanding and loyal. Even though I
realized after prom that I didn’t need him to be, he was a Mark Darcy.

Only better.
I was about to say it out loud, to my mom, when Wes looked at me with that

smile I loved. “You ready, Buxbaum? Mr. Fuzzy’s getting hungry and so am I.”
It was Wes’s idea to choose somewhere with outdoor seating so Fitz could

enjoy the great outdoors from his carrier before the long car ride.
How could I not love him?
“Yeah.” I narrowed my eyes at him but ruined the e ect by smiling. “But it’s

‘Mr. Fitzpervert,’ you tool.”
I started walking toward him, but when I glanced back at my mom’s

headstone, I almost tripped. Because a cardinal had landed on the chokecherry
branch that hung down beside it. He was bright red and beautiful, just sitting on
the branch and looking in my direction.

I blinked fast and narrowed my eyes as he opened his beak and chirped the
sweetest little melody.

I turned back to Wes, and he was looking at it over my shoulder. I said, “You
see it too, right?”

He gave a nod. “Holy shit.”
We both stood there, staring at the bird. After another moment he  ew away,

but my heart felt lighter, like my mother had wanted to make sure I knew she
was happy about me leaving. I cleared my throat and faced him. “You ready?”

“You okay?” He took two steps and was there, wrapping his big body around
mine. He ran his hand over my back and said into my hair, “Because we can stay



as long as you want, Liz.”
“I’m great, actually.” I pulled back and let myself stare at his handsome face,

at the person who had always been there for me, even when I hadn’t wanted him
to be. “Let’s go eat.”

let words = text.split(" ");
let pageSize = 120;
let pages = [];

for (let i = 0; i < words.length; i += pageSize) {
  pages.push(words.slice(i, i + pageSize).join(" "));
}

let current = 0;
let fontSize = 22;

function showPage() {
  document.getElementById("content").innerText = pages[current];
}

function nextPage() {
  if (current < pages.length - 1) {
    current++;
    showPage();
  }
}

function prevPage() {
  if (current > 0) {
    current--;
    showPage();
  }
}

function increaseFont() {
  fontSize += 2;
  document.body.style.fontSize = fontSize + "px";
}

function decreaseFont() {
  if (fontSize > 14) {
    fontSize -= 2;
    document.body.style.fontSize = fontSize + "px";
  }
}

function setTheme(mode) {
  if (mode === 'black') {
    document.body.style.background = "#000";
    document.body.style.color = "#fff";
  } else if (mode === 'grey') {
    document.body.style.background = "#888";
    document.body.style.color = "#000";
  } else if (mode === 'sepia') {
    document.body.style.background = "#f4ecd8";
    document.body.style.color = "#000";
  }
}

showPage();
</script>
